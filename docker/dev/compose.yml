services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Opi554556
      MYSQL_DATABASE: yii1_db
    volumes:
      - ../schema/partnership.sql:/docker-entrypoint-initdb.d/01-partnership.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pOpi554556"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - path: ./dev/.env
      - path: ./dev/override.env
        required: false
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: yii1_db
      DB_USER: root
      DB_PASSWORD: Opi554556
    ports:
      - "${DEV_PORT:-80}:80"
    volumes:
      - ../:/app
      - ../runtime:/app/runtime
      - caddy_data:/data
      - caddy_config:/config
    command: ["frankenphp", "run", "--config", "/app/docker/Caddyfile", "--adapter", "caddyfile"]
    tty: true

