services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: yii1_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ../schema/partnership.sql:/docker-entrypoint-initdb.d/01-partnership.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - path: ./dev/.env
      - path: ./dev/override.env
        required: false
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: yii1_db
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "${DEV_PORT:-80}:80"
    volumes:
      - ../:/app
      - ../runtime:/app/runtime
      - ../docker/php-max-execution.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - caddy_data:/data
      - caddy_config:/config
    command: ["frankenphp", "run", "--config", "/app/docker/Caddyfile", "--adapter", "caddyfile"]
    tty: true
